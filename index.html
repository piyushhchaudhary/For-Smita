<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey To Smita ❤️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Background -->
  <div id="stars"></div>
<div id="moon"></div>
  <!-- Welcome Screen -->
  <section id="welcome">
      <h1>Welcome Smita ❤️</h1>
  </section>

  <!-- Scene 2 -->
  <section id="scene2">
<div id="butterflies"></div>
      <div id="envelope" onclick="openEnvelope()">

          <div id="heart">❤️</div>

          <h2>To</h2>

          <h1>Smita</h1>

          <p>Tap To Open 💌</p>

      </div>

      <div id="letter">

          <h2>Dear Smita ❤️</h2>

          <p id="letterText"></p>

      </div>
<div id="gallery">

    <div class="polaroid">

        <img id="photo" src="smita1.jpg" alt="Smita">

        <p id="caption">
            It all started with a smile I couldn't forget. ❤️
        </p>

        <button id="nextPhoto" onclick="nextPhoto()">
            Next ❤️
        </button>

    </div>

</div>
  </section>
<!-- PROPOSAL SCENE -->

<section id="proposalScene">

    <div class="proposalCard">

        <h1>Smita ❤️</h1>

        <p id="proposalText">
            Every smile of yours became my favorite reason to smile.
            <br><br>
            Will You Be Mine Forever? 💍
        </p>

        <div class="proposalButtons">

            <button id="yesBtn">❤️ YES</button>

            <button id="noBtn">🤍 NO</button>

        </div>

    </div>

</section>

<script src="script.js"></script>
<section id="finalScene">

    <h1>❤️ She Said YES ❤️</h1>

    <h2>Our Story Begins Forever... 💍</h2>

    <div id="heartRain"></div>

</section>
</body>
</html>
