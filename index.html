<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey To Smita ❤️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Background -->
  <div id="stars"></div>
<div id="moon"></div>
  <!-- Welcome Screen -->
  <section id="welcome">
      <h1>Welcome Smita ❤️</h1>
  </section>

  <!-- Scene 2 -->
  <section id="scene2">
<div id="butterflies"></div>
      <div id="envelope" onclick="openEnvelope()">

          <div id="heart">❤️</div>

          <h2>To</h2>

          <h1>Smita</h1>

          <p>Tap To Open 💌</p>

      </div>

      <div id="letter">

          <h2>Dear Smita ❤️</h2>

          <p id="letterText"></p>

      </div>
<div id="gallery">

    <div class="polaroid">

        <img id="photo" src="smita1.jpg" alt="Smita">

        <p id="caption">
            It all started with a smile I couldn't forget. ❤️
        </p>

        <button id="nextPhoto" onclick="nextPhoto()">
            Next ❤️
        </button>

    </div>

</div>
  </section>

  <script src="script.js"></script>

</body>
</html>
<!-- CASTLE SCENE -->

<div id="castleScene">

    <div id="castle">
        🏰
    </div>

    <div id="princess">
        👸
    </div>

    <div id="hair"></div>

    <div id="prince">
        🤴
    </div>

    <button id="helpBtn" onclick="helpPrince()">
        ✨ Help The Prince
    </button>

</div>
